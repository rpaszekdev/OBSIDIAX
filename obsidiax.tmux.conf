# OBSIDIAX tmux config — loaded via `tmux -f` on a private `-L obsidiax`
# socket, so it NEVER touches the user's ~/.tmux.conf or their other servers.

# --- Color / truecolor ---------------------------------------------------
set  -g  default-terminal "tmux-256color"
set  -as terminal-features ",xterm-256color:RGB"
set  -as terminal-features ",tmux-256color:RGB"
set  -ga terminal-overrides ",*:Tc"
# Synchronized output (DECSET 2026): pass through so Claude Code's fullscreen
# renderer redraws atomically and doesn't tear. Requires tmux 3.4+.
set  -as terminal-features ",*:sync"

# --- TUI behaviour (Claude Code, vim, …) ---------------------------------
set  -sg escape-time 0          # no Esc delay -> snappy TUI key handling
set  -g  focus-events on        # Claude Code asked for this; pause/refocus
set  -g  set-clipboard on       # OSC52 clipboard through to xterm.js
setw -g  aggressive-resize on   # window tracks the attached client -> clean repaint on attach
set  -g  allow-passthrough on   # let apps emit OSC (images/clipboard) through tmux

# --- The tab strip (tmux windows shown as tabs at the top) ---------------
set  -g status on
set  -g status-position top
set  -g status-justify left
set  -g status-interval 5
set  -g status-left ""
set  -g status-right "#[fg=#565f89] #S "
set  -g status-style "bg=#16161e,fg=#787c99"
set  -g window-status-format " #I #W "
set  -g window-status-current-format " #I #W "
set  -g window-status-current-style "bg=#7aa2f7,fg=#16161e,bold"
set  -g window-status-separator ""
setw -g automatic-rename off    # keep the -n titles we set explicitly
setw -g allow-rename off
set  -g renumber-windows on     # tidy indices after closing a tab

# --- Splits open in the current pane's directory -------------------------
# Primary control is driven out-of-band by the plugin (Cmd-chords). These
# prefix bindings are a fallback for driving tmux directly (Ctrl-B then key).
bind-key Enter split-window -h -c "#{pane_current_path}"
bind-key d     split-window -v -c "#{pane_current_path}"

# --- Comfort -------------------------------------------------------------
set  -g  mouse on
set  -g  history-limit 50000
set  -g  base-index 1
setw -g  pane-base-index 1
